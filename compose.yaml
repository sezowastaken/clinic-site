services:
  web:
    build:
      context: ./apps/web
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    environment:
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgres://clinic:clinic@db:5432/clinic}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clinic}
      POSTGRES_USER: ${POSTGRES_USER:-clinic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clinic}
    volumes:
      - clinic_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clinic} -d ${POSTGRES_DB:-clinic}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  clinic_db_data:
